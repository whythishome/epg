name: Add known Tivimate channels

on:
  workflow_dispatch:
    inputs:
      channel_ids:
        description: "Comma-separated channel ids to copy from guides/tvguide.xml"
        required: false
        default: "HIST.us,FYIHD.us,RETRPLEXHD.us"
      source_file:
        description: "Raw guide XML source file"
        required: false
        default: "guides/tvguide.xml"
      target_file:
        description: "Tivimate guide XML target file"
        required: false
        default: "guides/tvguidetivimateguide.xml"

permissions:
  contents: write

jobs:
  patch-tivimate-guide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy known channels into Tivimate guide
        shell: bash
        env:
          CHANNEL_IDS: ${{ github.event.inputs.channel_ids }}
          SOURCE_FILE: ${{ github.event.inputs.source_file }}
          TARGET_FILE: ${{ github.event.inputs.target_file }}
        run: |
          set -euo pipefail

          if [ ! -f "$SOURCE_FILE" ]; then
            echo "Source file not found: $SOURCE_FILE"
            exit 1
          fi

          if [ ! -f "$TARGET_FILE" ]; then
            echo "Target file not found: $TARGET_FILE"
            exit 1
          fi

          python3 <<'PY'
          from pathlib import Path
          import os
          import sys
          import xml.etree.ElementTree as ET
          from copy import deepcopy

          source_path = Path(os.environ["SOURCE_FILE"])
          target_path = Path(os.environ["TARGET_FILE"])
          requested_ids = [x.strip() for x in os.environ["CHANNEL_IDS"].split(",") if x.strip()]

          def parse_xml(path: Path):
              try:
                  return ET.parse(path)
              except ET.ParseError as exc:
                  print(f"XML parse failed for {path}: {exc}", file=sys.stderr)
                  raise

          source_tree = parse_xml(source_path)
          target_tree = parse_xml(target_path)
          source_root = source_tree.getroot()
          target_root = target_tree.getroot()

          source_channels = {ch.get("id"): ch for ch in source_root.findall("channel") if ch.get("id")}
          target_channels = {ch.get("id"): ch for ch in target_root.findall("channel") if ch.get("id")}

          def display_name(ch):
              node = ch.find("display-name")
              return (node.text or "").strip() if node is not None else ""

          added = []
          skipped_existing = []
          missing_source = []

          channel_nodes = list(target_root.findall("channel"))
          insert_index = 0
          if channel_nodes:
              insert_index = list(target_root).index(channel_nodes[-1]) + 1

          for channel_id in requested_ids:
              if channel_id in target_channels:
                  skipped_existing.append(f"{channel_id} ({display_name(target_channels[channel_id])})")
                  continue

              source_channel = source_channels.get(channel_id)
              if source_channel is None:
                  missing_source.append(channel_id)
                  continue

              new_channel = deepcopy(source_channel)

              # Important for Tivimate: keep the display-name from the master/source guide.
              # That is the name you will assign against in Tivimate.
              source_name = display_name(source_channel)
              target_name_node = new_channel.find("display-name")
              if target_name_node is None:
                  target_name_node = ET.SubElement(new_channel, "display-name")
              target_name_node.text = source_name or channel_id.replace(".us", "")

              target_root.insert(insert_index, new_channel)
              insert_index += 1
              added.append(f"{channel_id} ({display_name(new_channel)})")

          ET.indent(target_tree, space="  ")
          target_tree.write(target_path, encoding="utf-8", xml_declaration=True)

          print("Added:")
          for item in added:
              print(f"  - {item}")
          print("Skipped existing:")
          for item in skipped_existing:
              print(f"  - {item}")
          print("Missing from source:")
          for item in missing_source:
              print(f"  - {item}")

          if missing_source:
              sys.exit(1)
          PY

      - name: Show diff
        shell: bash
        run: git diff -- guides/tvguidetivimateguide.xml

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- guides/tvguidetivimateguide.xml; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guides/tvguidetivimateguide.xml
          git commit -m "Add known Tivimate guide channels"
          git push
